name: Weekly Data Ingestion & Deploy

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2:00 AM UTC
  workflow_dispatch:      # Enable manual trigger from GitHub UI

jobs:
  ingest-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run ingestion pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        working-directory: backend
        run: python scripts/ingest_papers.py

      - name: Check if DB or index changed
        id: check_changes
        run: |
          git diff --quiet backend/breakthrough_radar.db backend/index.faiss backend/index_ids.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data files
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/breakthrough_radar.db backend/index.faiss backend/index_ids.json
          git commit -m "chore(data): weekly ingestion update [skip ci]"
          git push

      - name: Trigger Render redeploy (if data changed)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | jq .
